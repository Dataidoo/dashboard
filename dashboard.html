<html lang="en">

<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dashboard</title>

<style>
:root {
  --bg: #1a3a5c;
  --sl: #214872;
  --sd: #0f2438;
  --tp: #CFE2F3;
  --ts: #8ab4d4;
  --accent: #CFE2F3;
  --a1: #6FA8DC;
  --a2: #68b589;
  --a3: #e8a87c;
  --a4: #9b8ec4;
  --a5: #e07c7c;
  --font: 'Baloo 2', sans-serif;
  --font-h: 'Nunito', sans-serif;
  --r: 20px;
  --rs: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--tp);
  min-height: 100vh;
  padding: 20px 16px 100px;
  -webkit-font-smoothing: antialiased;
}
.neo  { box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl); border-radius: var(--r); background: var(--bg); }
.neos { box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl); border-radius: var(--rs); background: var(--bg); }
.neoi { box-shadow: inset 4px 4px 10px var(--sd), inset -2px -2px 7px var(--sl); }
.card { background: var(--bg); border-radius: var(--r); padding: 18px; margin-bottom: 14px;
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl); }
.slabel {
  font-family: var(--font-h); font-size: 0.7rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.4px; color: var(--ts); margin-bottom: 12px;
}

/* HEADER */
.header { text-align: center; margin-bottom: 18px; }
.logo-wrap {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px;
  box-shadow: 6px 6px 14px var(--sd), -4px -4px 10px var(--sl);
  overflow: hidden; background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
}
.logo-wrap img { width: 75%; height: 75%; object-fit: contain; filter: brightness(0) invert(0.9); }
.header h1 { font-family: var(--font-h); font-size: 1.6rem; font-weight: 900; color: var(--accent); }
.header .sub { font-size: 0.8rem; color: var(--ts); margin-top: 2px; font-weight: 600; }

/* CHART CARD */
.chart-card {
  background: var(--bg); border-radius: var(--r); padding: 18px; margin-bottom: 14px;
  box-shadow: 7px 7px 16px var(--sd), -4px -4px 12px var(--sl);
}
.ctrl-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
.ctrl-btn {
  flex: 1; padding: 9px 4px; border: none; border-radius: var(--rs);
  background: var(--bg); font-family: var(--font-h); font-size: 0.72rem;
  font-weight: 800; color: var(--ts); cursor: pointer; transition: all 0.15s; text-align: center;
  box-shadow: 4px 4px 8px var(--sd), -3px -3px 6px var(--sl);
}
.type-btn.active {
  color: var(--a1);
  box-shadow: inset 3px 3px 7px var(--sd), inset -2px -2px 5px var(--sl);
}
.time-btn.active {
  color: var(--a2);
  box-shadow: inset 3px 3px 7px var(--sd), inset -2px -2px 5px var(--sl);
}
.divider { width: 1px; background: var(--sd); opacity: 0.5; margin: 0 2px; align-self: stretch; }
.chart-wrapper {
  position: relative; height: 240px; margin-top: 8px; overflow: hidden;
}
.chart-empty {
  position: absolute; top:0; left:0; right:0; bottom:0;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; color: var(--ts);
  font-size: 0.85rem; font-weight: 700; gap: 8px; font-family: var(--font-h);
}
.chart-empty .ei { font-size: 2rem; }

/* METRICS GRID */
.metrics-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.m-btn {
  padding: 12px 4px; border: none; border-radius: var(--rs);
  background: var(--bg); font-family: var(--font-h);
  font-size: 0.64rem; font-weight: 800; color: var(--ts);
  cursor: pointer; transition: all 0.15s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.m-btn .mi {
  width: 30px; height: 30px; object-fit: contain;
  filter: brightness(0) invert(0.5); transition: filter 0.2s;
}
.m-btn.active {
  box-shadow: inset 3px 3px 7px var(--sd), inset -2px -2px 5px var(--sl);
  color: var(--accent);
}
.m-btn.active .mi { filter: brightness(0) invert(0.88); }

/* CORNER BTNS */
.corner-btns { display: flex; gap: 10px; }
.corner-btn {
  flex: 1; padding: 13px; border: none; border-radius: var(--rs);
  background: var(--bg);
  box-shadow: 5px 5px 10px var(--sd), -3px -3px 8px var(--sl);
  font-family: var(--font-h); font-size: 0.78rem; font-weight: 800;
  color: var(--ts); cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px;
  text-decoration: none; transition: all 0.2s;
}
.corner-btn:active { box-shadow: inset 3px 3px 7px var(--sd), inset -2px -2px 5px var(--sl); }
</style>
</head>

let activeMetrics = new Set(['mood','focus','energy']);
let chartType = 'line';
let days = 7;
let chartInst = null;

function buildGrid() {
  const grid = document.getElementById('metricsGrid');
  grid.innerHTML = '';
  METRICS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'm-btn' + (activeMetrics.has(m.id) ? ' active' : '');
    btn.dataset.id = m.id;
    btn.innerHTML = `<img class="mi" src="${m.icon}" alt="${m.label}"><span>${m.label}</span>`;
    btn.onclick = function() { toggleMetric(m.id, this); };
    grid.appendChild(btn);
  });
}

function toggleMetric(id, btn) {
  if (activeMetrics.has(id)) {
    if (activeMetrics.size === 1) return;
    activeMetrics.delete(id);
    btn.classList.remove('active');
  } else {
    activeMetrics.add(id);
    btn.classList.add('active');
  }
  renderChart();
}

function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); chartType = btn.dataset.type;
  const hm = document.getElementById('heatmapDiv'); if(hm) hm.style.display='none';
  renderChart();
}

function setTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); days = parseInt(btn.dataset.days);
  renderChart();
}

function loadEntries() {
  const entries = [];
  for (let i=0; i<localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key) continue;
    if (key.startsWith('lastSubmit_')) {
      try { const e = JSON.parse(localStorage.getItem(key)); if(e&&e.timestamp) entries.push(e); } catch(e){}
    }
  }
  try {
    const s = JSON.parse(localStorage.getItem('trackerState'));
    if (s&&s.date) {
      const LABELS = ['Low','Med','High'];
      const se = {
        timestamp: new Date(s.date).toISOString(), date:s.date, phase:s.phase,
        mood:   LABELS[(s.mfe&&s.mfe.mood!=null?s.mfe.mood:1)],
        focus:  LABELS[(s.mfe&&s.mfe.focus!=null?s.mfe.focus:1)],
        energy: LABELS[(s.mfe&&s.mfe.energy!=null?s.mfe.energy:1)],
        sleep_hrs: s.sleep||0,
        redbull: s.cons&&s.cons.redbull!=null?s.cons.redbull:0,
        smokes:  s.cons&&s.cons.smokes!=null?s.cons.smokes:0,
        toggles: s.toggles ? Object.entries(s.toggles).filter(([k,v])=>v).map(([k])=>k).join(', ')||'none' : 'none'
      };
      if (!entries.find(e=>e.date===se.date&&e.phase===se.phase)) entries.push(se);
    }
  } catch(e){}
  return entries.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
}

function filterDays(entries) {
  const cut = new Date(); cut.setDate(cut.getDate()-days);
  return entries.filter(e=>new Date(e.timestamp)>=cut);
}

function dateLabel(e) {
  return new Date(e.timestamp).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
}

function buildLabels() {
  const out=[];
  for(let i=days-1;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    out.push(d.toLocaleDateString('en-CA',{month:'short',day:'numeric'}));
  }
  return out;
}

function avgByDate(entries, labels, m) {
  const byDate={};
  entries.forEach(e=>{ const dl=dateLabel(e); if(!byDate[dl]) byDate[dl]=[]; byDate[dl].push(e); });
  return labels.map(l=>{
    const de=byDate[l];
    if(!de||!de.length) return null;
    if(m.type==='label') {
      const vals=de.map(e=>LMAP[e[m.id]]).filter(Boolean);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    }
    if(m.type==='num') {
      const vals=de.map(e=>parseFloat(e[m.field||m.id])).filter(v=>!isNaN(v));
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    }
    if(m.type==='toggle') {
      return de.filter(e=>e.toggles&&e.toggles.includes(m.id)).length;
    }
    return null;
  });
}

function renderChart() {
  const all=loadEntries();
  const entries=filterDays(all);
  const labels=buildLabels();
  const s=new Date(); s.setDate(s.getDate()-days);
  document.getElementById('dateRange').textContent=
    s.toLocaleDateString('en-CA',{month:'short',day:'numeric'})+' – '+
    new Date().toLocaleDateString('en-CA',{month:'short',day:'numeric'});

  if(chartInst){ chartInst.destroy(); chartInst=null; }
  const canvas=document.getElementById('mainChart');
  const empty=document.getElementById('chartEmpty');
  const hmdiv=document.getElementById('heatmapDiv');
  canvas.style.display='block'; hmdiv.style.display='none'; empty.style.display='none';

  if(entries.length===0){ empty.style.display='flex'; return; }

  const activeList=METRICS.filter(m=>activeMetrics.has(m.id));

  if(chartType==='heatmap') {
    canvas.style.display='none'; hmdiv.style.display='block';
    renderHeatmap(entries,labels,activeList); return;
  }

  const isLabel=activeList.every(m=>m.type==='label');
  const datasets=activeList.map(m=>{
    const data=avgByDate(entries,labels,m);
    return {
      label:m.label, data,
      borderColor:m.color, backgroundColor:m.color+'28',
      borderWidth:2, pointBackgroundColor:m.color,
      pointRadius:4, pointHoverRadius:6,
      tension:0.35, fill:chartType==='line', spanGaps:true
    };
  });

  const ctx=canvas.getContext('2d');
  chartInst=new Chart(ctx,{
    type:chartType,
    data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:activeList.length>1,
          labels:{font:{family:'Nunito',size:11,weight:'800'},color:'#8ab4d4',boxWidth:12,padding:10}
        },
        tooltip:{
          backgroundColor:'#1a3a5c',titleColor:'#CFE2F3',bodyColor:'#8ab4d4',
          borderColor:'#0f2438',borderWidth:1,
          titleFont:{family:'Nunito',weight:'800'},bodyFont:{family:'Baloo 2'},
          padding:10,cornerRadius:12
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{font:{family:'Nunito',size:10,weight:'700'},color:'#8ab4d4',maxRotation:45,maxTicksLimit:10}
        },
        y:{
          grid:{color:'rgba(15,36,64,0.6)'},
          ticks:{
            font:{family:'Nunito',size:10,weight:'700'},color:'#8ab4d4',
            callback: isLabel ? v=>['','Low','Med','High'][Math.round(v)]||'' : v=>v
          },
          min:isLabel?0:undefined, max:isLabel?3.5:undefined
        }
      }
    }
  });
}

function renderHeatmap(entries,labels,activeList) {
  const byDate={};
  entries.forEach(e=>{ const dl=dateLabel(e); if(!byDate[dl]) byDate[dl]=[]; byDate[dl].push(e); });
  const showLabels=labels.slice(-21);
  let html=`<div style="overflow-x:auto;padding-bottom:4px;">
  <table style="border-collapse:separate;border-spacing:3px;font-size:0.65rem;font-family:'Nunito',sans-serif;width:100%;">
  <tr><th style="color:#8ab4d4;text-align:left;padding:2px 4px;"></th>`;
  showLabels.forEach(l=>{
    html+=`<th style="color:#8ab4d4;text-align:center;font-weight:700;min-width:20px;">${l.split(' ')[1]}</th>`;
  });
  html+='</tr>';
  activeList.forEach(m=>{
    html+=`<tr><td style="color:#8ab4d4;font-weight:800;padding:2px 6px 2px 2px;white-space:nowrap;">
      <img src="${m.icon}" style="width:14px;height:14px;object-fit:contain;filter:brightness(0) invert(0.6);vertical-align:middle;margin-right:3px;">${m.label}</td>`;
    showLabels.forEach(l=>{
      const de=byDate[l]; let bg='#0f2438';
      if(de&&de.length) {
        if(m.type==='label') {
          const vals=de.map(e=>LMAP[e[m.id]]).filter(Boolean);
          if(vals.length) { const v=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length); bg=['#0f2438','#e8a87c','#6FA8DC','#68b589'][v]||'#0f2438'; }
        } else if(m.type==='toggle') {
          bg=de.some(e=>e.toggles&&e.toggles.includes(m.id))?m.color+'cc':'#0f2438';
        } else if(m.type==='num') {
          const vals=de.map(e=>parseFloat(e[m.field||m.id])).filter(v=>!isNaN(v));
          if(vals.length&&vals.reduce((a,b)=>a+b,0)>0) bg=m.color+'cc';
        }
      }
      html+=`<td style="background:${bg};border-radius:4px;width:20px;height:20px;"></td>`;
    });
    html+='</tr>';
  });
  html+='</table></div>';
  document.getElementById('heatmapDiv').innerHTML=html;
}

buildGrid();
renderChart();
</script>
</body>
</html>
