<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<link rel="apple-touch-icon" href="LOGO DASH.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  --bg:#1a3a5c;
  --lo:rgba(8,20,38,.55);
  --hi:rgba(35,70,110,.45);
  --ac:#CFE2F3;
  --dim:rgba(207,226,243,.52);
  background:var(--bg);
  color:var(--ac);
  font-family:'Baloo 2',sans-serif;
  min-height:100vh;
  padding-bottom:72px;
}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px}
.logo{height:32px;width:auto}
.hdr-r{text-align:right}
.app-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;color:var(--ac)}
.date-str{font-size:.7rem;color:var(--dim)}

/* ── Demo notice ── */
.demo-notice{
  margin:4px 14px;padding:8px 12px;
  background:rgba(255,200,0,.12);border-radius:10px;
  font-size:.72rem;color:rgba(255,230,100,.8);text-align:center;
  display:none
}

/* ── Controls ── */
.controls{margin:8px 14px;display:flex;flex-direction:column;gap:8px}
.ctrl-row{display:flex;gap:6px}
.ctrl-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px}
.ctrl-group{background:rgba(0,0,0,.2);border-radius:10px;overflow:hidden;display:flex;flex:1}
.cb{
  flex:1;padding:8px 4px;background:none;border:none;
  color:var(--dim);font-family:'Nunito',sans-serif;font-weight:700;font-size:.7rem;
  cursor:pointer;letter-spacing:.02em;transition:all .15s
}
.cb.on-blue{color:#4da6ff;background:rgba(77,166,255,.15);border-radius:8px}
.cb.on-green{color:#4ccc88;background:rgba(76,204,136,.15);border-radius:8px}

/* ── Chart area ── */
.chart-card{
  margin:8px 14px;background:var(--bg);border-radius:14px;
  box-shadow:5px 5px 12px var(--lo),-3px -3px 8px var(--hi);
  padding:14px;min-height:220px;
  display:flex;align-items:center;justify-content:center
}
#chartCanvas{width:100%!important;max-height:200px}

/* Heatmap */
.heatmap{width:100%;overflow-x:auto}
.hm-grid{display:grid;gap:2px;font-size:.52rem;color:var(--dim)}
.hm-label{display:flex;align-items:center;color:var(--dim);font-size:.6rem;font-weight:600;padding-right:4px;white-space:nowrap}
.hm-cell{height:16px;border-radius:3px;background:rgba(255,255,255,.05)}

/* ── Metrics grid ── */
.metrics-section{margin:8px 14px}
.sec-title{font-family:'Nunito',sans-serif;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:8px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.mt{
  padding:10px 8px;border:none;border-radius:12px;background:var(--bg);
  color:var(--dim);font-family:'Baloo 2',sans-serif;font-size:.68rem;font-weight:600;
  cursor:pointer;box-shadow:3px 3px 7px var(--lo),-2px -2px 5px var(--hi);
  transition:all .15s;text-align:left;line-height:1.3
}
.mt .mt-val{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;
  display:block;margin-top:2px
}
.mt.sel{box-shadow:inset 3px 3px 7px var(--lo),inset -2px -2px 5px var(--hi)}

/* ── Bottom nav ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;height:60px;display:flex;
  background:var(--bg);box-shadow:0 -3px 10px rgba(0,0,0,.3);z-index:99
}
.nb{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:none;border:none;color:var(--dim);
  font-family:'Baloo 2',sans-serif;font-size:.76rem;font-weight:600;
  cursor:pointer;text-decoration:none;gap:6px;transition:color .2s
}
.nb:hover,.nb:active{color:var(--ac)}

/* ── Loading ── */
.loading{text-align:center;color:var(--dim);font-size:.82rem;padding:40px 20px}
</style>
</head>
<body>

<div class="hdr">
  <img src="LOGO DASH.png" class="logo" alt="">
  <div class="hdr-r">
    <div class="app-name">Dashboard</div>
    <div class="date-str" id="ds"></div>
  </div>
</div>

<div class="demo-notice" id="demoNotice">
  &#9888; Demo data — set DATA_URL in the file to connect your tracker
</div>

<div class="controls">
  <div>
    <div class="ctrl-label">Chart type</div>
    <div class="ctrl-row">
      <div class="ctrl-group">
        <button class="cb on-blue" data-ct="line"    onclick="setChartType('line',this)">Line</button>
        <button class="cb"         data-ct="bar"     onclick="setChartType('bar',this)">Bar</button>
        <button class="cb"         data-ct="heatmap" onclick="setChartType('heatmap',this)">Heatmap</button>
      </div>
    </div>
  </div>
  <div>
    <div class="ctrl-label">Timeline</div>
    <div class="ctrl-row">
      <div class="ctrl-group">
        <button class="cb"          data-tl="7"  onclick="setTimeline(7,this)">7d</button>
        <button class="cb on-green" data-tl="30" onclick="setTimeline(30,this)">30d</button>
        <button class="cb"          data-tl="90" onclick="setTimeline(90,this)">90d</button>
      </div>
    </div>
  </div>
</div>

<div class="chart-card">
  <div class="loading" id="chartLoading">Loading data&hellip;</div>
  <canvas id="chartCanvas" style="display:none"></canvas>
  <div id="heatmapEl" class="heatmap" style="display:none"></div>
</div>

<div class="metrics-section">
  <div class="sec-title">Metrics — tap to overlay</div>
  <div class="mg" id="metricsGrid"></div>
</div>

<div class="bnav">
  <a id="trackerLink" href="TRACKER_URL_HERE" class="nb">&#9632; Tracker</a>
  <a href="https://claude.ai" class="nb">&#9670; Claude</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG — UPDATE THESE AFTER DEPLOYMENT
// ─────────────────────────────────────────────────────────────
const DATA_URL = '';
// Options (leave empty for demo data):
//   Apps Script: 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'
//   GitHub raw:  'https://raw.githubusercontent.com/Dataidoo/REPO/main/data/tracker-data.json'

const TRACKER_URL = 'TRACKER_URL_HERE';
// Example: 'https://dataidoo.github.io/ppl-tracker/daily-tracker.html'
// ─────────────────────────────────────────────────────────────

const METRICS = {
  mood:    { label:'Mood',     color:'#FF8A80', type:'mfe'  },
  focus:   { label:'Focus',    color:'#82B1FF', type:'mfe'  },
  energy:  { label:'Energy',   color:'#FFD180', type:'mfe'  },
  sleep:   { label:'Sleep',    color:'#A5D6A7', type:'num', max:10 },
  redbull: { label:'Red Bull', color:'#FF6E40', type:'num', max:12 },
  smokes:  { label:'Smokes',   color:'#BCAAA4', type:'num', max:22 },
  pill:    { label:'Pill',     color:'#CE93D8', type:'bool' },
  workout: { label:'Workout',  color:'#80CBC4', type:'bool' },
  resting: { label:'Resting',  color:'#90CAF9', type:'bool' },
  ate:     { label:'Ate',      color:'#FFE082', type:'bool' },
  study:   { label:'Study',    color:'#66BB6A', type:'bool' },
  work:    { label:'Work',     color:'#4DA6FF', type:'bool' },
  hobbies: { label:'Hobbies',  color:'#FFAB91', type:'bool' },
  read:    { label:'Read',     color:'#CF94DA', type:'bool' },
  hygiene: { label:'Hygiene',  color:'#80DEEA', type:'bool' },
  chores:  { label:'Chores',   color:'#D7CCC8', type:'bool' },
  puffed:  { label:'Puffed',   color:'#C5E1A5', type:'bool' },
  shop:    { label:'Shop',     color:'#FFCC02', type:'bool' }
};

const MFE_MAP = { L:1, M:2, H:3 };

let chartType = 'line';
let timeline  = 30;
let selected  = new Set(['mood','energy','sleep']);
let allData   = null;
let chart     = null;

// ── Data ──────────────────────────────────────────────────────
async function loadData() {
  if (!DATA_URL) { useDemoData(); return; }
  try {
    const r = await fetch(DATA_URL);
    if (!r.ok) throw new Error('fetch failed');
    allData = await r.json();
    render();
  } catch(e) {
    console.warn('Data fetch failed, using demo:', e);
    useDemoData();
  }
}

function useDemoData() {
  document.getElementById('demoNotice').style.display = 'block';
  allData = generateDemo();
  render();
}

function generateDemo() {
  const acts = ['pill','workout','resting','ate','study','work','hobbies','read','hygiene','chores','puffed','shop'];
  const mfe  = ['L','M','H'];
  const subs = [];
  for (let d = 89; d >= 0; d--) {
    const dt = new Date();
    dt.setDate(dt.getDate() - d);
    const date = dt.toISOString().split('T')[0];
    ['morning','lunch','dinner','bedtime'].slice(0, Math.floor(Math.random()*2)+2).forEach((ph,i) => {
      const actObj = {};
      acts.forEach(a => actObj[a] = Math.random() > 0.55);
      actObj.ate  = true;
      actObj.pill = i === 0 && Math.random() > 0.15;
      subs.push({
        id: date+'-'+ph, date, phase: ph,
        mood:   mfe[Math.floor(Math.random()*3)],
        focus:  mfe[Math.floor(Math.random()*3)],
        energy: mfe[Math.floor(Math.random()*3)],
        sleep:  Math.floor(Math.random()*4)+5,
        activities: actObj,
        redbull: Math.floor(Math.random()*4),
        smokes:  Math.floor(Math.random()*12)
      });
    });
  }
  return { submissions: subs };
}

// ── Aggregation ───────────────────────────────────────────────
function getDailyData(days) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const filtered = (allData.submissions || []).filter(s => new Date(s.date) >= cutoff);
  
  const byDate = {};
  filtered.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });
  
  const sorted = Object.keys(byDate).sort();
  return sorted.map(date => {
    const entries = byDate[date];
    const last = entries[entries.length - 1];
    const actObj = {};
    Object.keys(METRICS).filter(k => METRICS[k].type === 'bool').forEach(a => {
      actObj[a] = entries.some(e => e.activities && e.activities[a]);
    });
    return {
      date,
      mood:    MFE_MAP[last.mood]    || 2,
      focus:   MFE_MAP[last.focus]   || 2,
      energy:  MFE_MAP[last.energy]  || 2,
      sleep:   last.sleep   || 0,
      redbull: last.redbull || 0,
      smokes:  last.smokes  || 0,
      ...actObj
    };
  });
}

function getVal(row, key) {
  if (METRICS[key].type === 'bool') return row[key] ? 1 : 0;
  return row[key] || 0;
}

function todayVal(key) {
  if (!allData) return '-';
  const today = new Date().toISOString().split('T')[0];
  const todays = (allData.submissions || []).filter(s => s.date === today);
  if (!todays.length) return '-';
  const last = todays[todays.length - 1];
  const m = METRICS[key];
  if (m.type === 'mfe')  return last[key] || '-';
  if (m.type === 'bool') return todays.some(s => s.activities && s.activities[key]) ? '✓' : '✗';
  if (m.type === 'num')  return last[key] != null ? last[key] : '-';
  return '-';
}

// ── Render ────────────────────────────────────────────────────
function render() {
  document.getElementById('chartLoading').style.display = 'none';
  buildMetricsGrid();
  renderChart();
}

function renderChart() {
  const daily = getDailyData(timeline);
  if (chartType === 'heatmap') {
    renderHeatmap(daily);
    document.getElementById('chartCanvas').style.display = 'none';
    document.getElementById('heatmapEl').style.display   = 'block';
  } else {
    renderLineBar(daily);
    document.getElementById('chartCanvas').style.display = 'block';
    document.getElementById('heatmapEl').style.display   = 'none';
  }
}

function renderLineBar(daily) {
  const ctx = document.getElementById('chartCanvas').getContext('2d');
  if (chart) { chart.destroy(); chart = null; }
  const sel = [...selected];
  if (!sel.length || !daily.length) return;

  const labels = daily.map(d => d.date.slice(5)); // MM-DD
  const datasets = sel.map(key => {
    const m   = METRICS[key];
    const hex = m.color;
    return {
      label:           m.label,
      data:            daily.map(d => getVal(d, key)),
      borderColor:     hex,
      backgroundColor: chartType === 'bar' ? hex + '99' : 'transparent',
      pointBackgroundColor: hex,
      pointRadius:     daily.length > 30 ? 2 : 4,
      tension:         0.35,
      fill:            false,
      borderWidth:     2
    };
  });

  chart = new Chart(ctx, {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      animation: { duration: 300 },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: '#CFE2F3', font:{ size:10, family:"'Baloo 2'" }, boxWidth:12, padding:8 }
        }
      },
      scales: {
        x: {
          ticks: { color:'rgba(207,226,243,.5)', maxTicksLimit:8, font:{size:9} },
          grid:  { color:'rgba(255,255,255,.06)' }
        },
        y: {
          ticks: { color:'rgba(207,226,243,.5)', font:{size:9} },
          grid:  { color:'rgba(255,255,255,.06)' },
          beginAtZero: true
        }
      }
    }
  });
}

function renderHeatmap(daily) {
  const el  = document.getElementById('heatmapEl');
  const sel = [...selected];
  if (!sel.length || !daily.length) { el.innerHTML = '<div style="color:var(--dim);font-size:.75rem;padding:20px;text-align:center">Select metrics below</div>'; return; }

  const cols = daily.length + 1;
  const rows = sel.length + 1;

  // Header row: dates
  let html = '<div class="hm-grid" style="grid-template-columns:60px repeat(' + daily.length + ',1fr)">';
  html += '<div></div>'; // corner
  daily.forEach(d => {
    html += '<div class="hm-label" style="font-size:.48rem;justify-content:center">' + d.date.slice(5) + '</div>';
  });

  sel.forEach(key => {
    const m   = METRICS[key];
    const max = m.type === 'mfe' ? 3 : (m.type === 'bool' ? 1 : m.max || 10);
    html += '<div class="hm-label">' + m.label + '</div>';
    daily.forEach(d => {
      const v       = getVal(d, key);
      const norm    = Math.min(v / max, 1);
      const opacity = 0.1 + norm * 0.85;
      // Parse hex to rgb
      const r = parseInt(m.color.slice(1,3),16);
      const g = parseInt(m.color.slice(3,5),16);
      const b = parseInt(m.color.slice(5,7),16);
      html += '<div class="hm-cell" style="background:rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')"></div>';
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Metrics grid ──────────────────────────────────────────────
function buildMetricsGrid() {
  const el = document.getElementById('metricsGrid');
  el.innerHTML = '';
  Object.entries(METRICS).forEach(([key, m]) => {
    const btn = document.createElement('button');
    btn.className = 'mt' + (selected.has(key) ? ' sel' : '');
    btn.dataset.key = key;
    const val = todayVal(key);
    btn.innerHTML =
      '<span style="color:' + m.color + ';font-weight:700">' + m.label + '</span>' +
      '<span class="mt-val" style="color:' + (selected.has(key) ? m.color : 'var(--dim)') + '">' + val + '</span>';
    btn.addEventListener('click', () => toggleMetric(key, btn, m));
    el.appendChild(btn);
  });
}

function toggleMetric(key, btn, m) {
  if (selected.has(key)) {
    selected.delete(key);
    btn.classList.remove('sel');
    btn.querySelector('.mt-val').style.color = 'var(--dim)';
  } else {
    selected.add(key);
    btn.classList.add('sel');
    btn.querySelector('.mt-val').style.color = m.color;
  }
  renderChart();
}

// ── Controls ──────────────────────────────────────────────────
function setChartType(t, btn) {
  chartType = t;
  document.querySelectorAll('[data-ct]').forEach(b => b.classList.remove('on-blue'));
  btn.classList.add('on-blue');
  renderChart();
}

function setTimeline(t, btn) {
  timeline = t;
  document.querySelectorAll('[data-tl]').forEach(b => b.classList.remove('on-green'));
  btn.classList.add('on-green');
  renderChart();
}

// ── Init ──────────────────────────────────────────────────────
(function () {
  document.getElementById('trackerLink').href = TRACKER_URL;
  document.getElementById('ds').textContent = new Date().toLocaleDateString('en-CA',{
    weekday:'short', month:'short', day:'numeric'
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  loadData();
})();
</script>
</body>
</html>
